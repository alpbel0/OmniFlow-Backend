# Backend CI Pipeline
# Runs on Pull Requests to main branch
# Performs: restore, build, test

name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/workflows/ci.yml'

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Backend/OmniFlow/OmniFlow.slnx

      - name: Build solution
        run: dotnet build Backend/OmniFlow/OmniFlow.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test Backend/OmniFlow/OmniFlow.slnx --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName!~Integration"

      # Optional: Run integration tests if they exist
      # - name: Run integration tests
      #   run: dotnet test Backend/OmniFlow/OmniFlow.slnx --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName~Integration"

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dotnet-format
        run: dotnet tool install -g dotnet-format

      - name: Check code formatting
        run: dotnet-format Backend/OmniFlow/OmniFlow.slnx --verify-no-changes --verbosity diagnostic
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Backend/OmniFlow/OmniFlow.slnx

      - name: Check for vulnerable packages
        run: dotnet list Backend/OmniFlow/OmniFlow.slnx package --vulnerable --include-transitive
        continue-on-error: true