name: Deploy OmniFlow Backend to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install dependencies
      run: dotnet restore
      working-directory: ./Backend/OmniFlow

    - name: Build
      run: dotnet build --configuration Release --no-restore
      working-directory: ./Backend/OmniFlow

    - name: Publish
      run: dotnet publish OmniFlow.WebApi/OmniFlow.WebApi.csproj -c Release -o ../../publish
      working-directory: ./Backend/OmniFlow

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'omniflow-backend'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish